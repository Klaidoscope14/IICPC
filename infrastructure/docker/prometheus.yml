global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'submission-service'
    static_configs:
      - targets: ['submission-service:8080']
    metrics_path: /metrics

  - job_name: 'benchmark-orchestrator'
    static_configs:
      - targets: ['benchmark-orchestrator:8081']
    metrics_path: /metrics

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8082']
    metrics_path: /metrics
