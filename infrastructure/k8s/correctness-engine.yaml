apiVersion: apps/v1
kind: Deployment
metadata:
  name: correctness-engine
  namespace: iicpc
  labels:
    app: correctness-engine
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: correctness-engine
  template:
    metadata:
      labels:
        app: correctness-engine
    spec:
      containers:
      - name: correctness-engine
        image: iicpc/correctness-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: iicpc-config
        env:
        - name: PORT
          value: "8086"
        volumeMounts:
        - name: traces-volume
          mountPath: /app/traces
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: traces-volume
        persistentVolumeClaim:
          claimName: traces-storage-pvc
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: correctness-engine
  namespace: iicpc
spec:
  ports:
  - port: 8086
    targetPort: 8086
    protocol: TCP
  selector:
    app: correctness-engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: correctness-engine-hpa
  namespace: iicpc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: correctness-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
