apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-orchestrator
  namespace: iicpc
  labels:
    app: benchmark-orchestrator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: benchmark-orchestrator
  template:
    metadata:
      labels:
        app: benchmark-orchestrator
    spec:
      containers:
      - name: benchmark-orchestrator
        image: iicpc/benchmark-orchestrator:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: iicpc-config
        - secretRef:
            name: iicpc-secrets
        env:
        - name: SERVER_PORT
          value: "8081"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: storage-volume
          mountPath: /data/iicpc-storage
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: storage-volume
        persistentVolumeClaim:
          claimName: submission-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: benchmark-orchestrator
  namespace: iicpc
spec:
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: benchmark-orchestrator
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: benchmark-orchestrator-hpa
  namespace: iicpc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: benchmark-orchestrator
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
