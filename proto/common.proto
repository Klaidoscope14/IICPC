syntax = "proto3";

package common.v1;

option go_package = "github.com/iicpc/pkg/contracts/gen/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageResponse {
  string next_page_token = 1;
  int32 count = 2;
}

message ErrorDetail {
  string field = 1;
  string code = 2;
  string message = 3;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
  repeated ErrorDetail details = 3;
  string request_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message HealthCheckResponse {
  string status = 1;
  string service = 2;
  string version = 3;
  map<string, string> checks = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message ResourceLimits {
  int64 cpu_milli = 1;
  int64 memory_mb = 2;
  int64 timeout_seconds = 3;
}
