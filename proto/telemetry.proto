syntax = "proto3";

package telemetry.v1;

option go_package = "github.com/iicpc/pkg/contracts/gen/telemetry/v1;telemetryv1";

import "google/protobuf/timestamp.proto";

service TelemetryService {
  rpc StreamMetrics(StreamMetricsRequest) returns (stream MetricsUpdate);
  rpc SubmitMetrics(SubmitMetricsRequest) returns (SubmitMetricsResponse);
  rpc GetHistoricalMetrics(GetHistoricalMetricsRequest) returns (GetHistoricalMetricsResponse);
}

message StreamMetricsRequest {
  string benchmark_id = 1;
}

message MetricsUpdate {
  string benchmark_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  TelemetryMetrics metrics = 3;
}

message TelemetryMetrics {
  double current_tps = 1;
  double avg_latency_ms = 2;
  int32 total_orders_sent = 3;
  int32 total_orders_acknowledged = 4;
  int32 total_errors = 5;
  double p50_latency_ms = 6;
  double p90_latency_ms = 7;
  double p99_latency_ms = 8;
  int32 active_connections = 9;
  double cpu_usage_percent = 10;
  double memory_usage_mb = 11;
}

message SubmitMetricsRequest {
  string benchmark_id = 1;
  repeated MetricPoint metrics = 2;
}

message MetricPoint {
  google.protobuf.Timestamp timestamp = 1;
  string metric_name = 2;
  double value = 3;
  map<string, string> labels = 4;
}

message SubmitMetricsResponse {
  bool success = 1;
  int32 points_accepted = 2;
}

message GetHistoricalMetricsRequest {
  string benchmark_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  repeated string metric_names = 4;
}

message GetHistoricalMetricsResponse {
  repeated MetricPoint metrics = 1;
}
