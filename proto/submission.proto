syntax = "proto3";

package submission.v1;

option go_package = "github.com/iicpc/pkg/contracts/gen/submission/v1;submissionv1";

import "common.proto";
import "google/protobuf/timestamp.proto";

service SubmissionService {
  rpc UploadSubmission(UploadSubmissionRequest) returns (UploadSubmissionResponse);
  rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse);
  rpc ListSubmissions(ListSubmissionsRequest) returns (ListSubmissionsResponse);
  rpc UpdateSubmissionStatus(UpdateSubmissionStatusRequest) returns (UpdateSubmissionStatusResponse);
  rpc DeleteSubmission(DeleteSubmissionRequest) returns (DeleteSubmissionResponse);
  rpc ListSubmissionLogs(ListSubmissionLogsRequest) returns (ListSubmissionLogsResponse);
}

message UploadSubmissionRequest {
  string contestant_id = 1;
  string team_name = 2;
  string language = 3;
  bytes code_archive = 4;
  string original_filename = 5;
  string dockerfile = 6;
  string idempotency_key = 7;
  map<string, string> metadata = 8;
}

message UploadSubmissionResponse {
  string submission_id = 1;
  string status = 2;
  int32 version = 3;
  string checksum = 4;
  int64 file_size = 5;
  string original_filename = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetSubmissionRequest {
  string submission_id = 1;
}

message GetSubmissionResponse {
  Submission submission = 1;
}

message BenchmarkResult {
  double tps = 1;
  double p50_latency_ms = 2;
  double p90_latency_ms = 3;
  double p99_latency_ms = 4;
  double correctness_score = 5;
  int32 total_orders = 6;
  int32 failed_orders = 7;
}

message ListSubmissionsRequest {
  string contestant_id = 1;
  string status = 2;
  common.v1.PageRequest page = 3;
}

message ListSubmissionsResponse {
  repeated Submission submissions = 1;
  common.v1.PageResponse page = 2;
}

message Submission {
  string id = 1;
  string contestant_id = 2;
  string team_name = 3;
  string language = 4;
  string status = 5;
  int32 version = 6;
  string checksum = 7;
  string original_filename = 8;
  int64 file_size = 9;
  string storage_path = 10;
  map<string, string> metadata = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  BenchmarkResult benchmark_result = 14;
}

message UpdateSubmissionStatusRequest {
  string submission_id = 1;
  string status = 2;
  string error_message = 3;
}

message UpdateSubmissionStatusResponse {
  bool success = 1;
}

message DeleteSubmissionRequest {
  string submission_id = 1;
}

message DeleteSubmissionResponse {
  bool success = 1;
}

message ListSubmissionLogsRequest {
  string submission_id = 1;
  common.v1.PageRequest page = 2;
}

message ListSubmissionLogsResponse {
  repeated SubmissionLog logs = 1;
  common.v1.PageResponse page = 2;
}

message SubmissionLog {
  string id = 1;
  string submission_id = 2;
  string log_type = 3;
  string level = 4;
  string message = 5;
  google.protobuf.Timestamp created_at = 6;
}
